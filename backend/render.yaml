# ============================================
# render.yaml - Render.com Deployment Config
# ============================================
# Deploy backend to Render.com

services:
  - type: web
    name: qrcodekey-backend
    runtime: node
    region: oregon
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false  # Set manually in Render dashboard
      - key: JWT_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false  # Set to your Vercel URL
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
    healthCheckPath: /api/health
    autoDeploy: true
